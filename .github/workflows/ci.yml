name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/cicd-pipeline
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Testes Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      API_URL: ${{ secrets.API_URL }}
      NODE_ENV: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: ./backend
        run: npm ci

      - name: Executar testes
        working-directory: ./backend
        run: npm test

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar arquivo .env para o build
        run: |
          cat > .env <<EOF
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          API_URL=${{ secrets.API_URL }}
          EOF

      - name: Build das imagens via Docker Compose
        run: docker compose build

      - name: Validar containers sobem corretamente
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose down